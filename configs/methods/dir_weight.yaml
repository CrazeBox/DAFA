method: "dir_weight"
description: "Direction-based Weighting (DAFA ablation with β=0)"

hyperparameters:
  local_lr:
    type: "choice"
    values: [0.1, 0.01, 0.001]
  gamma:
    type: "choice"
    values: [0.5, 1.0, 2.0]
  mu:
    type: "fixed"
    value: 0.01
  use_pi_weighting:
    type: "choice"
    values: [true, false]
  server_lr:
    type: "fixed"
    value: 1.0

aggregation:
  type: "direction_weighted"
  use_data_size_weighting: "${use_pi_weighting}"
  temperature: "${gamma}"
  threshold: "${mu}"

local_training:
  optimizer: "sgd"
  momentum: 0.9
  weight_decay: 0.0001

description_full: |
  Dir-Weight: Direction-based Weighting (DAFA ablation with β=0)
  
  This is an ablation version of DAFA without momentum proxy.
  Instead of using a momentum-smoothed proxy direction, it directly
  uses the current FedAvg update direction.
  
  Key differences from DAFA:
  - No momentum smoothing (β=0)
  - Proxy direction v* = Δ_FedAvg / ||Δ_FedAvg|| (current round only)
  - Less stable proxy direction, but simpler baseline
  
  Algorithm:
  1. Compute FedAvg update: Δ_FedAvg = Σ p_i * Δ_i / Σ p_i
  2. Compute proxy direction: v* = Δ_FedAvg / ||Δ_FedAvg|| (no momentum!)
  3. For each client i:
     - If ||Δ_i|| >= μ: s_i = <Δ_i/||Δ_i||, v*>
     - Else: s_i = 0 (graceful degradation)
  4. Compute weights: w_i = p_i * exp(γ * s_i) / Σ p_j * exp(γ * s_j)
  5. Aggregate: Δ_DirWeight = Σ w_i * Δ_i
  
  Reference: NeurIPS Paper4 - Section 7.8
