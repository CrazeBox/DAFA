method: "fedavg"
description: "Federated Averaging (McMahan et al., 2017)"

hyperparameters:
  local_lr:
    type: "choice"
    values: [0.1, 0.01, 0.001]
  
aggregation:
  type: "weighted_average"
  use_data_size_weighting: true

local_training:
  optimizer: "sgd"
  momentum: 0.9
  weight_decay: 0.0001
