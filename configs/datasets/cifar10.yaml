dataset:
  name: "cifar10"
  num_classes: 10
  num_clients: 100
  alpha: 0.5

model:
  name: "resnet18"
  num_classes: 10

data:
  root: "data/cifar10"
  download: true

transforms:
  train:
    - type: "RandomCrop"
      params:
        size: 32
        padding: 4
    - type: "RandomHorizontalFlip"
      params: {}
    - type: "ToTensor"
      params: {}
    - type: "Normalize"
      params:
        mean: [0.4914, 0.4822, 0.4465]
        std: [0.2023, 0.1994, 0.2010]
  test:
    - type: "ToTensor"
      params: {}
    - type: "Normalize"
      params:
        mean: [0.4914, 0.4822, 0.4465]
        std: [0.2023, 0.1994, 0.2010]

partition:
  type: "dirichlet"
  alpha: 0.5
  min_samples_per_client: 10

training:
  local_epochs: 5
  target_accuracy: 80.0
