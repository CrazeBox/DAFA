dataset:
  name: "shakespeare"
  num_classes: 80
  num_clients: 1129
  sampled_clients: 100

model:
  name: "lstm"
  num_classes: 80
  hidden_size: 256
  num_layers: 2
  embedding_dim: 8

data:
  root: "data/shakespeare"
  download: true
  seq_length: 80

partition:
  type: "natural"
  min_samples_per_client: 100

training:
  local_epochs: 2
  target_perplexity: 5.0
