dataset:
  name: "femnist"
  num_classes: 62
  num_clients: 3597
  sampled_clients: 100

model:
  name: "cnn"
  num_classes: 62

data:
  root: "data/femnist"
  download: true

transforms:
  train:
    - type: "ToTensor"
      params: {}
    - type: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]
  test:
    - type: "ToTensor"
      params: {}
    - type: "Normalize"
      params:
        mean: [0.5]
        std: [0.5]

partition:
  type: "natural"
  min_samples_per_client: 10

training:
  local_epochs: 10
  target_accuracy: 80.0
