experiment:
  name: "dafa_experiment"
  seed: 42
  device: "cuda"
  num_workers: 4

training:
  num_rounds: 200
  local_epochs: 5
  batch_size: 64
  client_fraction: 0.1
  eval_freq: 10

optimizer:
  type: "sgd"
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0001

checkpoint:
  save_dir: "results/checkpoints"
  save_freq: 50
  resume: null

logging:
  log_dir: "results/logs"
  log_freq: 10
  use_wandb: false
  wandb_project: "dafa"
